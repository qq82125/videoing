services:
  videoing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: videoing
    init: true
    restart: unless-stopped
    ports:
      - "${VIDEOING_PORT:-3016}:3016"
    environment:
      RUNNING_IN_DOCKER: "1"
      HOST: 0.0.0.0
      PORT: 3016
      NODE_ENV: production
    env_file:
      - path: .env.local
        required: false
    volumes:
      - ./data:/app/data
      - ./src:/app/src:ro
      - ./public:/app/public:ro
      - ./scripts:/app/scripts:ro
      - ./README.md:/app/README.md:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3016/api/status"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
